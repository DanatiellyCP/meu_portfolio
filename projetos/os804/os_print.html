<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OS 804 - Ordem de Serviço</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="js/functions.js"></script>
    <style>
        body {
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        #osContainer {
            max-width: 800px;
            margin: 30px auto;
            padding: 25px;
            background-color: #fff;
            border: 2px solid #333;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        header img {
            height: 60px;
        }
        header h1 {
            font-size: 24px;
            color: #222;
            margin: 0;
        }
        .section-title {
            font-weight: bold;
            margin-top: 15px;
            margin-bottom: 5px;
            color: #555;
            border-bottom: 1px solid #ccc;
            padding-bottom: 3px;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        .info-label {
            font-weight: 600;
            color: #333;
        }
        .info-value {
            color: #000;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        table th, table td {
            border: 1px solid #333;
            padding: 8px;
            text-align: left;
        }
        table th {
            background-color: #f2f2f2;
        }
        footer {
            margin-top: 30px;
            border-top: 2px solid #333;
            padding-top: 10px;
            text-align: center;
            color: #555;
            font-size: 14px;
        }
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0 50px;
        }
        .action-buttons button {
            width: 150px;
        }
    </style>
</head>
<body onload="exibirDadosMulti()">

<div id="osContainer">
    <header>
        <img src="logo.png" alt="Logo da Empresa" id="logoEmpresa">
        <h1>OS | Encomendas</h1>
    </header>

    <div class="section-title">Empresa / Cliente</div>
    <div class="info-row"><span class="info-label">Empresa:</span> <span id="exibirEmpresa" class="info-value"></span></div>
    <div class="info-row"><span class="info-label">Cliente:</span> <span id="exibirCliente" class="info-value"></span></div>

    <div class="section-title">Produto / Serviço</div>
    <table>
        <thead>
            <tr>
                <th>Produto</th>
                <th>Descrição</th>
                <th>Qtd</th>
                <th>Valor Unitário</th>
                <th>Valor Total</th>
            </tr>
        </thead>
        <tbody id="produtosTabela">
            <!-- Linhas serão preenchidas dinamicamente -->
        </tbody>
        <tfoot>
            <tr>
                <th colspan="4" style="text-align:right;">Total Geral:</th>
                <th id="totalGeral">0.00</th>
            </tr>
        </tfoot>
    </table>

    <div class="section-title">Datas</div>
    <div class="info-row"><span class="info-label">Data Encomenda:</span> <span id="exibirDataEncomenda" class="info-value"></span></div>
    <div class="info-row"><span class="info-label">Data Entrega:</span> <span id="exibirDataEntrega" class="info-value"></span></div>

    <footer>
       <div class="info-row"><span id="exibirRodape" class="info-value"></span></div>
       
      
    </footer>
</div>

<div class="action-buttons">
    <button id="saveBtn" class="btn btn-primary" onclick="SalvarIMG()">Salvar OS</button>
    <button id="printBtn" class="btn btn-secondary" onclick="window.print()">Imprimir OS</button>
</div>

<script>
function exibirDadosMulti() {
    const Empresa = sessionStorage.getItem('Empresa');
    const Cliente = sessionStorage.getItem('Cliente');
    const DtEncomenda = sessionStorage.getItem('DtEncomenda');
    const DtEntrega = sessionStorage.getItem('DtEntrega');
    const Produtos = JSON.parse(sessionStorage.getItem('Produtos') || '[]');
    const Rodape = sessionStorage.getItem('rodape');

    document.getElementById('exibirEmpresa').textContent = Empresa;
    document.getElementById('exibirCliente').textContent = Cliente;
    document.getElementById('exibirRodape').textContent = Rodape;
    document.getElementById('exibirDataEncomenda').textContent = new Date(DtEncomenda).toLocaleDateString('pt-BR');
    document.getElementById('exibirDataEntrega').textContent = new Date(DtEntrega).toLocaleDateString('pt-BR');

    const tbody = document.getElementById('produtosTabela');
    tbody.innerHTML = ''; // Limpa linhas antigas
    let totalGeral = 0;

    Produtos.forEach(item => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${item.produto}</td>
            <td>${item.descricao}</td>
            <td>${item.qtd}</td>
            <td>${parseFloat(item.valorU).toFixed(2)}</td>
            <td>${parseFloat(item.valorT).toFixed(2)}</td>
        `;
        tbody.appendChild(tr);
        totalGeral += parseFloat(item.valorT);
    });

    document.getElementById('totalGeral').textContent = totalGeral.toFixed(2);
}

// Função para salvar OS como PNG
function SalvarIMG() {
    const osContainer = document.getElementById('osContainer');
    html2canvas(osContainer, { scale: 2 }).then(canvas => {
        const imgData = canvas.toDataURL('image/png');
        const link = document.createElement('a');
        link.href = imgData;
        link.download = 'OS_804.png';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }).catch(err => console.error('Erro ao gerar imagem:', err));
}
</script>

</body>
</html>
